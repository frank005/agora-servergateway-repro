# Reproduce Agora SDK pthread scheduling assertion (no CAP_SYS_NICE, RLIMIT_RTPRIO=0).
# Build (from repo root, arm64 SDK): docker compose -f deploy/docker-compose.yml build
# Run: docker compose -f deploy/docker-compose.yml run --rm repro
# Env: create deploy/.env with AGORA_APP_ID, AGORA_CHANNEL_ID (see README).

services:
  repro:
    env_file:
      - .env
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    platform: linux/arm64   # match included aarch64 SDK; omit or set linux/amd64 if using x86_64 SDK
    # Drop SYS_NICE so container cannot use real-time scheduling (reproduces the issue)
    cap_drop:
      - SYS_NICE
    # Do not add any capabilities
    # security_opt and ulimits leave RLIMIT_RTPRIO at default 0 in typical Docker
    ulimits:
      rtprio: 0             # explicitly 0 to match restricted environments
    # Optional: uncomment below to verify it works *with* CAP_SYS_NICE (no crash)
    # cap_add:
    #   - SYS_NICE
    # ulimits:
    #   rtprio: 64
