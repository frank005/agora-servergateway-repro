# Deploy Agora Server Gateway repro in Kubernetes with all capabilities dropped
# to reproduce the pthread scheduling assertion (same as docker run --cap-drop=ALL).
#
# Build and load image (e.g. into kind):
#   docker build -f deploy/Dockerfile -t agora-repro:latest .
#   kind load docker-image agora-repro:latest
#
# Apply: kubectl apply -f deploy/kubernetes/
# Check logs (expect SIGABRT): kubectl logs -f deployment/agora-repro
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agora-repro
  labels:
    app: agora-repro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agora-repro
  template:
    metadata:
      labels:
        app: agora-repro
    spec:
      # Reproduce issue: drop all capabilities (matches docker run --cap-drop=ALL)
      securityContext:
        capabilities:
          drop:
            - ALL
      containers:
        - name: repro
          image: agora-repro:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      restartPolicy: Always
